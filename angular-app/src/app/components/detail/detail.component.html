<div class="pb-16 md:pb-32" *ngIf="achievement() as a">
  <div class="app-container">
    <header class="py-12 md:py-24">
      <button (click)="state.navigateToHome()" class="mb-6 md:mb-12 flex items-center gap-4 text-brand-accent font-bold uppercase tracking-widest text-sm hover:translate-x-[-10px] transition-transform">
        <span class="text-2xl">←</span> Return to Overview
      </button>
      <span class="font-mono text-sm uppercase tracking-[0.4em] opacity-50 block mb-6 md:mb-8 font-bold">{{ a.tag }}</span>
      <h2 class="font-serif font-bold tracking-tighter leading-[0.9] mb-8 md:mb-12" style="font-size: clamp(2.5rem, 7vw, 9rem);">{{ a.title }}</h2>
      <div class="shimmer-line" style="width: 50%; margin-left: 0; margin-right: 0;"></div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 lg:gap-20">
      <div class="space-y-10 lg:space-y-16">
        <p class="font-light opacity-80 leading-tight" style="font-size: clamp(1.25rem, 2.5vw, 2.8rem);">
          {{ a.desc }}
        </p>
        <div class="grid grid-cols-2 gap-4 md:gap-8">
          <div class="uniform-card p-6 md:p-12">
            <span class="font-mono text-xs opacity-40 uppercase tracking-widest font-bold block mb-3 md:mb-4">Uptime Metric</span>
            <span class="text-4xl md:text-5xl lg:text-6xl font-serif font-bold text-brand-accent tracking-tighter">{{ a.stat1 }}</span>
            <p class="text-xs md:text-sm font-bold uppercase opacity-50 mt-3 md:mt-4">{{ a.label1 }}</p>
          </div>
          <div class="uniform-card p-6 md:p-12">
            <span class="font-mono text-xs opacity-40 uppercase tracking-widest font-bold block mb-3 md:mb-4">Inference Velocity</span>
            <span class="text-4xl md:text-5xl lg:text-6xl font-serif font-bold text-brand-accent tracking-tighter">{{ a.stat2 }}</span>
            <p class="text-xs md:text-sm font-bold uppercase opacity-50 mt-3 md:mt-4">{{ a.label2 }}</p>
          </div>
        </div>
      </div>
      <div class="space-y-8 md:space-y-12">
        <div class="uniform-card p-6 md:p-12 shadow-2xl">
          <h4 class="font-mono text-xs uppercase tracking-widest opacity-50 font-bold mb-6 md:mb-10 text-center">Performance Trajectory</h4>
          <div class="chart-container">
            <canvas #detailChartCanvas></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
