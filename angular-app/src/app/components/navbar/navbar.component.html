<nav id="navbar" class="fixed top-0 w-full z-50 bg-brand-cream/90 dark:bg-brand-dark/90 backdrop-blur-md border-b border-black/5 dark:border-white/5">
  <!-- Main Bar -->
  <div class="app-container py-5 lg:py-8 flex justify-between items-center">
    <div class="font-serif text-2xl lg:text-3xl font-bold tracking-tighter cursor-pointer" (click)="closeMobileMenu(); state.navigateToHome()">SCRIPTONE.</div>

    <!-- Desktop Nav Links -->
    <div *ngIf="isHome()" class="hidden lg:flex items-center gap-12 font-sans text-sm font-bold tracking-widest uppercase">
      <button (click)="scrollToSection('achievements-sec')" class="opacity-60 hover:opacity-100 transition-opacity">Achievements</button>
      <button (click)="scrollToSection('services-sec')" class="opacity-60 hover:opacity-100 transition-opacity">Services</button>
      <button (click)="scrollToSection('resources-sec')" class="opacity-60 hover:opacity-100 transition-opacity">Resources</button>
      <button (click)="scrollToSection('sponsor')" class="opacity-60 hover:opacity-100 transition-opacity">Sponsor Us</button>
    </div>

    <!-- Right Controls -->
    <div class="flex items-center gap-3 md:gap-5">
      <button (click)="state.toggleTheme()" class="w-10 h-10 lg:w-12 lg:h-12 rounded-full border border-black/10 dark:border-white/20 dark:text-white flex items-center justify-center hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition-all">
        <span class="text-lg lg:text-xl">{{ themeIcon() }}</span>
      </button>
      <button class="hidden md:block bg-brand-dark text-white dark:bg-brand-cream dark:text-black px-6 py-2.5 lg:px-8 lg:py-3 rounded-full text-sm font-bold hover:scale-105 transition-transform shadow-xl">
        Consult
      </button>
      <!-- Hamburger — mobile only, home page only -->
      <button *ngIf="isHome()" (click)="toggleMobileMenu()" class="lg:hidden w-10 h-10 rounded-full border border-black/10 dark:border-white/20 dark:text-white flex items-center justify-center hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition-all">
        <span class="text-base font-bold leading-none">{{ mobileMenuOpen ? '✕' : '☰' }}</span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu Drawer -->
  <div *ngIf="mobileMenuOpen && isHome()" class="lg:hidden border-t border-black/5 dark:border-white/5">
    <div class="app-container py-8 flex flex-col gap-2 font-sans text-sm font-bold tracking-widest uppercase">
      <button (click)="scrollToSection('achievements-sec')" class="text-left py-3 opacity-60 hover:opacity-100 border-b border-black/5 dark:border-white/5 transition-opacity">Achievements</button>
      <button (click)="scrollToSection('services-sec')" class="text-left py-3 opacity-60 hover:opacity-100 border-b border-black/5 dark:border-white/5 transition-opacity">Services</button>
      <button (click)="scrollToSection('resources-sec')" class="text-left py-3 opacity-60 hover:opacity-100 border-b border-black/5 dark:border-white/5 transition-opacity">Resources</button>
      <button (click)="scrollToSection('sponsor')" class="text-left py-3 opacity-60 hover:opacity-100 border-b border-black/5 dark:border-white/5 transition-opacity">Sponsor Us</button>
      <button class="mt-4 w-full bg-brand-dark text-white dark:bg-brand-cream dark:text-black py-4 rounded-full text-sm font-bold hover:scale-105 transition-transform shadow-xl">
        Consult
      </button>
    </div>
  </div>
</nav>
